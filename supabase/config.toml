# Supabase local development configuration
# Run `supabase start` to spin up the local stack.

project_id = "pulz"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# Update this to your production URL before deploying.
site_url = "http://localhost:8080"
additional_redirect_urls = ["https://localhost:8080"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# ──────────────────────────────────────────────────────────────────────────────
# Clerk JWT integration
#
# PulZ uses Clerk for authentication. Supabase must be configured to accept
# Clerk-issued JWTs so that Row Level Security policies can identify the user.
#
# Setup steps (one-time, in Supabase dashboard):
#   1. Go to Settings → Authentication → Third-party Auth
#   2. Add Clerk as a provider
#   3. Enter your Clerk JWKS URL:
#      https://<your-clerk-domain>/.well-known/jwks.json
#      (e.g. https://ruling-krill-25.clerk.accounts.dev/.well-known/jwks.json)
#
# Setup steps (in Clerk dashboard):
#   1. Go to JWT Templates → New Template → Supabase
#   2. Use this claims body:
#      {
#        "aud": "authenticated",
#        "role": "authenticated"
#      }
#   3. The "sub" claim is automatically set to the Clerk user ID.
#
# After this, RLS policies use:  (auth.jwt() ->> 'sub') = clerk_id
# ──────────────────────────────────────────────────────────────────────────────

# Edge function JWT verification settings
# clerk-webhook and stripe-webhook use their own signature verification,
# so Supabase JWT auth is disabled for those endpoints.
[functions.clerk-webhook]
verify_jwt = false

[functions.stripe-webhook]
verify_jwt = false

[functions.episode-detection]
verify_jwt = true

[functions.self-training]
verify_jwt = true
